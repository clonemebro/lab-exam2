<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>

    <script>
        function table() {

            var n = prompt("Enter a number:");
            var result = "";

            for (var i = 1; i <= 10; i++) {
                result += n + " x " + i + " = " + (n * i) + "\n";
            }

            alert(result);
        }
    </script>
</head>

<body>

    <h2>Multiplication Table</h2>

    <button onclick="table()">Show Table</button>

</body>
</html>
